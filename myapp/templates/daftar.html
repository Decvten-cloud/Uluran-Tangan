<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Register Form Animation CSS</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='daftar.css') }}">
    </head>

    <body>
        <div class="glowing-light"></div>
        <div class="login-box">
            <form method="POST" action="{{ url_for('daftar') }}">
                <h2>Register</h2>
                <div class="input-box">
                    <span class="icon">
                        <ion-icon name="person"></ion-icon>
                    </span>
                    <input type="text" name="fullname" id="fullname" required />
                    <label>Full Name</label>
                    <div class="input-line"></div>
                </div>
                <div class="input-box">
                    <span class="icon">
                        <ion-icon name="mail"></ion-icon>
                    </span>
                    <input type="email" name="email" id="email" required />
                    <label>Email</label>
                    <div class="input-line"></div>
                </div>
                <div class="input-box">
                    <span class="icon">
                        <ion-icon name="lock-closed"></ion-icon>
                    </span>
                    <input type="number" name="no_tlp" id="confirm_password" required />
                    <label>no telepon</label>
                    <div class="input-line"></div>
                </div>
                <div class="input-box">
                    <span class="icon">
                        <ion-icon name="lock-closed"></ion-icon>
                    </span>
                    <input type="password" name="password" id="password" required />
                    <label>Password</label>
                    <div class="input-line"></div>
                </div>
                <div class="input-box">
                    <span class="icon">
                        <ion-icon name="lock-closed"></ion-icon>
                    </span>
                    <input type="password" name="confirm_password" id="confirm_password" required />
                    <label>Confirm Password</label>
                    <div class="input-line"></div>
                </div>
                <button type="submit">Register</button>
                <div class="register-link">
                    <p>Already have an account? <a href="{{url_for('login')}}">Login</a></p>
                </div>
            </form>
        </div>

        <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
        <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
    </body>
</html>
